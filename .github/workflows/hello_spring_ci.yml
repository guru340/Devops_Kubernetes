name: Hello Spring Boot App To Docker

on:
  push
  # workflow_dispatch

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and Test (Maven)
        working-directory: Devops/springboot/hello-spring
        run: mvn -B clean verify

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: Devops/springboot/hello-spring/target/surefire-reports

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: Devops/springboot/hello-spring/target/*.jar

  docker-build-push:
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: Devops/springboot/hello-spring/target

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: Devops/springboot/hello-spring
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/hello-spring:${{ github.sha }}