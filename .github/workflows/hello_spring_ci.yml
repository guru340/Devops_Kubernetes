name: Hello Spring Boot App To Docker

on:
    push
    # workflow_dispatch

jobs:
    build-test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Debug - show repo structure
              run: find . -maxdepth 5 -type d
            
            - name: Setup JDK
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin'
                java-version: '21'
              
            
            - name: Build and Test(Maven)
              working-directory: Devops/springboot/hello-spring
              run: mvn -B clean verify

            - name: Upload Test Reports
              uses: actions/upload-artifact@v4
              with:
                name: test-reports
                path: Devops/springboot/hello-spring/target/surefire-reports

                

            
    
    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test


