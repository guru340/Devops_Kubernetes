name: Tax Calculator CI_CD to AWS EKS

on:
    # push
    workflow_dispatch

jobs:
    build-test:
        runs-on: ubuntu-latest
       

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            
            - name: Create .env for Build
              working-directory: app2-tax-calculator/tax-calculator-frontend
              run: echo "VITE_API_URL" > .env
              
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '25' 
                
                
            - name: Install Frontend Dependencies
              run: npm ci
              working-directory: app2-tax-calculator/tax-calculator-frontend


            - name: Run Tests
              working-directory: app2-tax-calculator/tax-calculator-frontend
              run: npm test --if-present
        
            - name: Build Frontend
              working-directory: app2-tax-calculator/tax-calculator-frontend
              run: npm run build

                

            
    
    docker-build-push:
        runs-on: ubuntu-latest
        needs: build-test
        



        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Debug Files
              run: |
                pwd
                ls -la
                ls -la app2-tax-calculator
                ls -la app2-tax-calculator/tax-calculator-frontend
              

            - name: Login to DockerHub
              uses: docker/login-action@v3
              with:
               username: ${{ secrets.DOCKERHUB_USERNAME }}
               password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Create .env for Build
              working-directory: app2-tax-calculator/tax-calculator-frontend
              run: echo "VITE_API_URL" > .env    
            
            - name: Build and Push Docker Image  
              uses: docker/build-push-action@v6
              with:
                context: app2-tax-calculator/tax-calculator-frontend
                file: app2-tax-calculator/tax-calculator-frontend/Dockerfile
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/tax-calculator-frontend:latest


                
    deploy-aws-eks:
        runs-on: ubuntu-latest
        needs: docker-build-push


        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ap-south-1
            
            - name: Setup Kubectl
              uses: azure/setup-kubectl@v4
              with:
                version: 'latest'

            - name: Update kubeconfig for EKS
              run: aws eks update-kubeconfig --region ap-south-1 --name hello-cluster

            - name: Verify connection
              run: kubectl get nodes

            - name: Deploy to AWS (Kubernetes)
              run: |
                kubectl apply -f aws/Frontend
                kubectl apply -f aws/ingress.yaml
                