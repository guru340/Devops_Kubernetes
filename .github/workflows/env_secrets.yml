name: Demo Env CI

on:
  push
  # workflow_dispatch

env:
  GLOBAL_APP_ENV: GLOBAL_ENV

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      JOB_APP_ENV: JOB_ENV

    steps:
      - name: Say Hello
        run: echo "Hello From the Second pipline"

      - name: Install
        env:
          APP_ENV: demo_ci
          DB_PASS: ${{ secrets.DB_PASSWORD }}
        run: echo "Environment $APP_ENV"
        

      - name: Create Demo file
        run: 
            echo "File create">demo.txt
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .