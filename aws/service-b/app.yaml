apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-b
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-b  
  template:
    metadata:
      labels:
        app: service-b
    spec:
      containers:
        - name: service-b
          image: embarkx/tax-service-b:latest
          

          ports:
            - containerPort: 4000

---
apiVersion: v1
kind: Service
metadata:
  name: service-a  
spec:
  selector:
    app: service-a 
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 80
     